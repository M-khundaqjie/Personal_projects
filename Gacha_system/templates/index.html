<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASTRA</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<canvas id="bg-stars"></canvas>

<main class="stage">

  <header class="wordmark">
    <h1>ASTRA</h1>
    <p>fates written in starlight</p>
  </header>

  <section class="pity-gauge">
    <div class="pity-track">
      <div class="pity-zone" style="left: 82.2%;"></div>
      <div class="pity-fill" id="pity-fill"></div>
      <div class="pity-dot" id="pity-dot"></div>
    </div>
    <div class="pity-labels">
      <span id="pity-text">0 / 90 since last constellation</span>
      <span id="guarantee-text" class="hidden">next constellation guaranteed featured</span>
    </div>
  </section>

  <section class="controls">
    <button class="draw-btn" id="draw-1" data-count="1">
      <span>Draw</span><small>×1</small>
    </button>
    <button class="draw-btn" id="draw-10" data-count="10">
      <span>Draw</span><small>×10</small>
    </button>
  </section>

  <section class="stats">
    <div class="stat"><strong id="stat-total">0</strong><span>total draws</span></div>
    <div class="stat"><strong id="stat-5">0</strong><span>constellations</span></div>
    <div class="stat"><strong id="stat-4">0</strong><span>named stars</span></div>
  </section>

  <button class="history-toggle" id="history-toggle">Star Chart Log</button>
  <button class="reset-link" id="reset-btn">reset</button>

</main>

<aside class="history-panel" id="history-panel">
  <div class="history-head">
    <span>Star Chart Log</span>
    <button id="history-close">&times;</button>
  </div>
  <ol class="history-list" id="history-list"></ol>
</aside>

<div class="reveal-overlay hidden" id="reveal-overlay">
  <button class="reveal-close" id="reveal-close">&times;</button>
  <div class="reveal-cards" id="reveal-cards"></div>
  <button class="reveal-continue" id="reveal-continue">continue</button>
</div>

<script src="/static/main.js"></script>
</body>
</html>
